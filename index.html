<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNABACAFE</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-wrap">
    
    <header class="main-visual">
      <div class="visual-content">
        <p class="sub-copy">昭和のぬくもりを、今の時間に。</p>
        <h1 class="visual-logo">SUNABACAFE</h1>
        <div class="visual-info">
          <p class="shop-info">OPEN 10:00 - 18:00</p>
          <p class="shop-info">TEL: 03-1234-5678</p>
        </div>
      </div>
    </header>

    <main>
      <section class="gallery">
        <article class="polaroid">
          <div class="photo-placeholder">
            <img src="inside.png" alt="店内の雰囲気">
          </div>
          <h2>店内の雰囲気</h2>
        </article>

        <article class="polaroid">
          <div class="photo-placeholder">
            <img src="owner.png" alt="店長の写真">
          </div>
          <h2>店長の写真</h2>
        </article>
      </section>

      <div class="section-title">
        <span>オススメメニュー</span>
      </div>

      <section class="menu-grid">
        <section class="menu-column">
          <h3>Drink</h3>
          <div class="cards">
            <article class="menu-card">
              <div class="menu-visual"><img src="coffee.png" alt="コーヒー"></div>
              <p class="menu-name">コーヒー</p>
              <p class="menu-price">¥500</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="icedcoffee.png" alt="アイスコーヒー"></div>
              <p class="menu-name">アイスコーヒー</p>
              <p class="menu-price">¥500</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="Matcha.png" alt="抹茶"></div>
              <p class="menu-name">抹茶</p>
              <p class="menu-price">¥600</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="Heabtea.png" alt="ハーブティー"></div>
              <p class="menu-name">ハーブティー</p>
              <p class="menu-price">¥700</p>
            </article>
          </div>
        </section>

        <section class="menu-column">
          <h3>Food</h3>
          <div class="cards">
            <article class="menu-card">
              <div class="menu-visual"><img src="Napolitan.png" alt="ナポリタン"></div>
              <p class="menu-name">ナポリタン</p>
              <p class="menu-price">¥1100</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="pudding.png" alt="昔のプリン"></div>
              <p class="menu-name">昔のプリン</p>
              <p class="menu-price">¥680</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="Sand.png" alt="サンドイッチ"></div>
              <p class="menu-name">サンドイッチ</p>
              <p class="menu-price">¥800</p>
            </article>

            <article class="menu-card">
              <div class="menu-visual"><img src="meatsauce.png" alt="しっかりミートソース"></div>
              <p class="menu-name">しっかりミートソース</p>
              <p class="menu-price">¥950</p>
            </article>
          </div>
        </section>
      </section>

      <section class="access-section">
        <div class="section-title">
          <span>アクセス</span>
        </div>
        <p style="text-align: center; margin-bottom: 20px;">〒794-0015 愛媛県今治市常盤町４丁目8−１８ しまなみイノベーションビル 2階</p>

        <div class="map-card">
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3301.2185257121283!2d132.99349107577586!3d34.06319957315281!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x35503bbafa63386f%3A0x6dd7c005b5147b29!2zU1VOQUJBQ08g5LuK5rK7!5e0!3m2!1sja!2sjp!4v1710744000000!5m2!1sja!2sjp"
           width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
